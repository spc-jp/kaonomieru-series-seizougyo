<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>顔の見える社長｜有限会社カワセ精工</title>
<meta name="description" content="小ロット・試作・急ぎの加工まで。町工場の社長が、最初のご相談をお受けします。">
<meta property="og:title" content="顔の見える社長｜有限会社カワセ精工">
<meta property="og:description" content="図面がなくても大丈夫です。まずはお話を聞かせてください。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://spc-jp.github.io/kaogamieru-shacho-mfg/">
<meta property="og:image" content="ogp.png">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --ink:#1c2733;
  --sub:#5f6f7d;
  --paper:#f7f4ee;
  --card:#ffffff;
  --line:#e4ded4;
  --accent:#c1631f;
  --accent-soft:#fdf3ea;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(180deg,#fbf9f5 0%,var(--paper) 100%);
  color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  line-height:1.9;
  font-size:15px;
  -webkit-text-size-adjust:100%;
}
.wrap{max-width:660px;margin:0 auto;padding:28px 18px 60px}

/* ヘッダー */
.head{text-align:center;padding:14px 0 24px}
.badge{
  display:inline-block;font-size:11px;letter-spacing:.22em;
  color:var(--accent);border:1px solid var(--accent);
  border-radius:100px;padding:5px 16px 4px;margin-bottom:20px;
}
.avatar{
  width:114px;height:114px;border-radius:50%;object-fit:cover;
  border:4px solid #fff;box-shadow:0 8px 26px rgba(28,39,51,.13);
  background:var(--accent-soft);display:block;margin:0 auto 16px;
}
.avatar-fb{
  width:114px;height:114px;border-radius:50%;margin:0 auto 16px;
  display:none;align-items:center;justify-content:center;
  background:var(--accent-soft);color:var(--accent);
  font-size:30px;letter-spacing:.06em;
  border:4px solid #fff;box-shadow:0 8px 26px rgba(28,39,51,.13);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
}
h1{
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  font-size:23px;font-weight:600;letter-spacing:.05em;margin-bottom:6px;
}
.who{font-size:12.5px;color:var(--sub);letter-spacing:.08em}
.note{font-size:11.5px;color:#93a0ab;margin-top:12px;letter-spacing:.03em}

/* 会話 */
.chat{margin-top:6px}
.msg{display:flex;gap:10px;margin-bottom:14px;align-items:flex-start}
.msg .ic{
  width:34px;height:34px;border-radius:50%;flex:0 0 34px;
  object-fit:cover;background:var(--accent-soft);margin-top:2px;
}
.bubble{
  background:var(--card);border:1px solid var(--line);
  border-radius:4px 16px 16px 16px;padding:15px 17px;
  box-shadow:0 2px 10px rgba(28,39,51,.045);
  max-width:82%;
}
.msg.me{justify-content:flex-end}
.msg.me .bubble{
  background:var(--accent-soft);border-color:#f0dcc9;
  border-radius:16px 4px 16px 16px;color:#8a4713;font-size:14px;
}
.typing{display:flex;gap:5px;padding:17px}
.typing i{
  width:6px;height:6px;border-radius:50%;background:#c3ccd4;
  animation:blink 1.3s infinite;
}
.typing i:nth-child(2){animation-delay:.22s}
.typing i:nth-child(3){animation-delay:.44s}
@keyframes blink{0%,100%{opacity:.28}50%{opacity:1}}

/* 選択肢 */
.gl{
  font-size:11.5px;color:var(--sub);letter-spacing:.14em;
  margin:26px 0 10px;display:flex;align-items:center;gap:10px;
}
.gl::after{content:"";flex:1;height:1px;background:var(--line)}
.opt{
  display:block;width:100%;text-align:left;cursor:pointer;
  background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:15px 18px;margin-bottom:9px;
  font-size:14.5px;color:var(--ink);font-family:inherit;line-height:1.7;
  transition:border-color .35s ease,box-shadow .35s ease,transform .35s ease;
}
.opt:hover{
  border-color:var(--accent);
  box-shadow:0 6px 18px rgba(193,99,31,.12);
  transform:translateY(-1px);
}
.opt .arw{color:var(--accent);margin-right:9px;font-size:13px}
.opt.soft{
  background:transparent;border:1px dashed #d8d1c5;
  color:var(--sub);font-size:13.5px;padding:13px 18px;
  text-align:center;margin-top:4px;
}
.opt.soft .arw{display:none}
.opt.soft:hover{
  border-style:solid;border-color:var(--accent);color:var(--ink);
  box-shadow:none;transform:none;background:var(--card);
}

/* 出口 */
.exit{margin-top:26px}
.cta{
  display:block;text-align:center;text-decoration:none;
  padding:16px;border-radius:14px;margin-bottom:10px;font-size:15px;
  transition:transform .35s ease,box-shadow .35s ease;
}
.cta.main{
  background:var(--accent);color:#fff;
  box-shadow:0 6px 20px rgba(193,99,31,.28);
}
.cta.sub{background:#fff;color:var(--ink);border:1px solid var(--line)}
.cta:hover{transform:translateY(-2px)}
.cta small{display:block;font-size:11.5px;opacity:.8;margin-top:3px;font-weight:400}
.back{
  display:block;margin:22px auto 0;background:none;border:none;
  color:var(--sub);font-size:12.5px;cursor:pointer;
  font-family:inherit;text-decoration:underline;text-underline-offset:4px;
}

/* フッター */
footer{margin-top:52px;border-top:1px solid var(--line);padding-top:20px}
.disc{font-size:11.5px;color:#8b97a1;line-height:1.95}
.sig{font-size:11.5px;color:#a6b0b9;margin-top:14px;text-align:center;letter-spacing:.05em}

/* ふわっと */
.fade{animation:up .75s cubic-bezier(.2,.7,.3,1) both}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

@media (prefers-reduced-motion: reduce){
  .fade{animation:none}
  .typing i{animation:none;opacity:.6}
  .opt,.cta{transition:none}
}
</style>
</head>

function el(h){ var d=document.createElement("div"); d.innerHTML=h.trim(); return d.firstChild; }
function esc(t){ return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/\n/g,"<br>"); }
function down(){ window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"}); }

function ai(text, cb){
  var t = el('<div class="msg fade"><img class="ic" src="'+AV+'" alt="" onerror="this.style.visibility=\'hidden\'"><div class="bubble"><div class="typing"><i></i><i></i><i></i></div></div></div>');
  chat.appendChild(t); down();
  setTimeout(function(){
    t.querySelector(".bubble").innerHTML = esc(text);
    down();
    if(cb) setTimeout(cb, 420);
  }, 780);
}

function me(text){
  chat.appendChild(el('<div class="msg me fade"><div class="bubble">'+esc(text)+'</div></div>'));
  down();
}

function menu(){
  GROUPS.forEach(function(g, gi){
    if(g.title){
      var h = el('<div class="gl fade">'+esc(g.title)+'</div>');
      h.style.animationDelay = (gi*0.12)+"s";
      chat.appendChild(h);
    }
    g.ids.forEach(function(id, i){
      var b = el('<button class="opt'+(R[id].soft?" soft":"")+' fade"><span class="arw">▸</span>'+esc(R[id].label)+'</button>');
      b.style.animationDelay = (gi*0.12 + i*0.09 + 0.1)+"s";
      b.onclick = function(){ pick(id); };
      chat.appendChild(b);
    });
  });
}

function clearOpts(){
  Array.prototype.slice.call(chat.querySelectorAll(".opt,.gl")).forEach(function(n){ n.remove(); });
}

function pick(id){
  var r = R[id];
  clearOpts();
  me(r.label);
  ai(r.accept, function(){
    ai(r.ask, function(){
      r.opts.forEach(function(o, i){
        var b = el('<button class="opt fade"><span class="arw">▸</span>'+esc(o.l)+'</button>');
        b.style.animationDelay = (i*0.1)+"s";
        b.onclick = function(){
          clearOpts();
          me(o.l);
          ai(o.r, function(){ exit(r, o.l, o.exit); });
        };
        chat.appendChild(b);
      });
      down();
    });
  });
}

function exit(r, choice, over){
  var mode = over || r.exit;
  ai("よろしければ、ここから先は直接お話しさせてください。\nお見積りは無料です。話を聞くだけ、でもかまいません。", function(){
    var url = CONF.formUrl + (CONF.formUrl.indexOf("?")<0?"?":"&") + "ref=" + encodeURIComponent(r.label+"／"+choice);
    var form = '<a class="cta '+(mode==="tel"?"sub":"main")+'" href="'+url+'">見積り・ご相談フォーム<small>選んでいただいた内容を引き継ぎます</small></a>';
    var tel  = '<a class="cta '+(mode==="tel"?"main":"sub")+'" href="tel:'+CONF.tel.replace(/-/g,"")+'">お電話でご相談<small>'+esc(CONF.telLabel)+'</small></a>';
    var box = el('<div class="exit fade">'+(mode==="tel"?tel+form:form+tel)+'<button class="back">はじめの画面にもどる</button></div>');
    box.querySelector(".back").onclick = function(){ chat.innerHTML=""; start(); };
    chat.appendChild(box); down();
  });
}

function start(){ ai(CONF.hello, menu); }
setTimeout(start, 1150);
</script>
